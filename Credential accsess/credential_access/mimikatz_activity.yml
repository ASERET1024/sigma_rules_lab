title: Suspicious Mimikatz Activity

id: 22222222-3333-4444-5555-666666666666

status: experimental

description: Detects possible Mimikatz credential dumping activity

author: Teresa Ramirez

date: 2026/05/13

references:
  - https://attack.mitre.org/techniques/T1003/

logsource:
  product: windows
  category: process_creation

detection:

  selection:

    CommandLine|contains:
      - 'mimikatz'
      - 'sekurlsa'
      - 'logonpasswords'
      - 'lsadump'
      - 'wdigest'

  condition: selection

falsepositives:
  - Security testing
  - Authorized penetration testing

level: critical

tags:
  - attack.credential_access
  - attack.t1003
  - mimikatz
  