title: LSASS Memory Dump Detection

id: bbbbbbbb-cccc-dddd-eeee-ffffffffffff

status: experimental

description: Detects attempts to dump LSASS process memory for credential access

author: Teresa Ramirez

date: 2026/05/13

references:
  - https://attack.mitre.org/techniques/T1003/001/

logsource:
  product: windows
  category: process_creation

detection:

  selection_lsass:

    CommandLine|contains:
      - 'lsass'
      - 'comsvcs.dll'
      - 'MiniDump'

  selection_tools:

    Image|endswith:
      - '\procdump.exe'
      - '\rundll32.exe'

  condition: selection_lsass and selection_tools

falsepositives:
  - Authorized forensic activity
  - Security testing

level: critical

tags:
  - attack.credential_access
  - attack.t1003.001
  - lsass