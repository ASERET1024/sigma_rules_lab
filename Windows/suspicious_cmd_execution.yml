title: Suspicious CMD Execution

id: eeeeeeee-ffff-1111-2222-333333333333

status: experimental

description: Detects suspicious command shell activity on Windows systems

author: Teresa Ramirez

date: 2026/05/13

references:
  - https://attack.mitre.org/techniques/T1059/003/

logsource:
  product: windows
  category: process_creation

detection:

  selection_cmd:

    Image|endswith:
      - '\cmd.exe'

  suspicious_commands:

    CommandLine|contains:
      - 'whoami'
      - 'net user'
      - 'ipconfig'
      - 'tasklist'
      - 'systeminfo'
      - 'ping '
      - 'netstat'
      - 'dir '

  condition: selection_cmd and suspicious_commands

falsepositives:
  - Administrative troubleshooting
  - IT support activity

level: medium

tags:
  - attack.execution
  - attack.t1059.003
  - cmd