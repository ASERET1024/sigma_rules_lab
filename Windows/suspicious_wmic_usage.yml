title: Suspicious WMIC Usage

id: ffffffff-1111-2222-3333-444444444444

status: experimental

description: Detects suspicious WMIC command execution on Windows systems

author: Teresa Ramirez

date: 2026/05/13

references:
  - https://attack.mitre.org/techniques/T1047/

logsource:
  product: windows
  category: process_creation

detection:

  selection:

    Image|endswith:
      - '\wmic.exe'

  suspicious_commands:

    CommandLine|contains:
      - 'process call create'
      - 'shadowcopy delete'
      - 'qfe'
      - 'startup'
      - 'service list'

  condition: selection and suspicious_commands

falsepositives:
  - Legitimate system administration
  - IT inventory scripts

level: high

tags:
  - attack.execution
  - attack.t1047
  - wmic