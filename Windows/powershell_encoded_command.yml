 title: Suspicious PowerShell Encoded Command
 id: 11111111-2222-3333-4444-555555555555
 status: experimental
 description: Detects suspicious PowerShell Encoded Commands
 author: Teresa  Ramirez 
 date: 2026/05/13
 references:
     -- https://attack.mitre.org/techniques/T1059/001/

 logsource:
   product: windows
   category: process_creation

 detection:
  
  selection:
   Image|endswith:
    - '\powershell.exe'

   CommadLine|contains:
    - 'Encoded Comand'
    - 'FromBase64String'
    - 'IEX'
    - 'Invoke-Expression'

   Condition: selection

  falsepositives:
   - Administrative scripts
   - Legitimate automation

  level: high

  tags: 
   - attack.execution
   - attack.t1059.001
   - powershell
   